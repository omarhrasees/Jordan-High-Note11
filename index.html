            { module: 10, english: 'sitcom', arabic: 'مسلسل كوميدي (كوميديا الموقف)' },

            { module: 10, english: 'deliver the punchline', arabic: 'يسلم الخاتمة الطريفة / لب النكتة' },
            { module: 10, english: 'do a stand-up routine', arabic: 'يقدم عرضًا كوميديًا واقفًا' },

            { module: 10, english: 'childlike', arabic: 'طفولي (بريء)' },
            { module: 10, english: 'childish', arabic: 'طفولي (ساذج / غير ناضج)' },
            { module: 10, english: 'alive', arabic: 'حي / مفعم بالحياة' },
            { module: 10, english: 'lively', arabic: 'نشيط / حيوي' },
            { module: 10, english: 'tasty', arabic: 'لذيذ (طعام)' },
            { module: 10, english: 'tasteful', arabic: 'راقي / ذو ذوق رفيع' },
            { module: 10, english: 'appalling', arabic: 'مروع / صادم' },
            { module: 10, english: 'cheesy', arabic: 'رخيص / مبتذل / غير مقنع' },
            { module: 10, english: 'comical', arabic: 'كوميدي (مضحك)' },
            { module: 10, english: 'comic', arabic: 'كوميدي (متعلق بالكوميديا)' },
            { module: 10, english: 'exceptional', arabic: 'استثنائي / رائع' },
            { module: 10, english: 'offensive', arabic: 'مسيء / مهين' },
            { module: 10, english: 'unconvincing', arabic: 'غير مقنع' }
        ];

        // Pronunciation helper function
        function generatePronunciation(word) {
            const pronunciations = {
                // Module 6
                "necessity": "/nəˈsesəti/",
                "prohibition": "/ˌproʊɪˈbɪʃən/",
                "ability": "/əˈbɪləti/",
                "permission": "/pərˈmɪʃən/",
                "managed to": "/ˈmænɪdʒd tu/",
                "obliged to": "/əˈblaɪdʒd tu/",
                // Module 7
                "contaminate": "/kənˈtæmɪneɪt/",
                "discrimination": "/dɪˌskrɪmɪˈneɪʃən/",
                "persecution": "/ˌpɜːrsɪˈkjuːʃən/",
                "investigation": "/ɪnˌvestɪˈɡeɪʃən/",
                "aspiration": "/ˌæspəˈreɪʃən/",
                // Module 8
                "virtual reality": "/ˈvɜːrtʃuəl riˈæləti/",
                "autism spectrum disorder": "/ˈɔːtɪzəm ˈspektrəm dɪsˈɔːrdər/",
                "deceptive": "/dɪˈseptɪv/",
                "superficial": "/ˌsuːpərˈfɪʃəl/",
                // Module 9
                "success": "/səkˈses/",
                "failure": "/ˈfeɪljər/",
                "opportunity": "/ˌɑːpərˈtuːnəti/",
                "acknowledge": "/əkˈnɑːlɪdʒ/",
                // Module 10
                "culture vulture": "/ˈkʌltʃər ˈvʌltʃər/",
                "embroider": "/ɪmˈbrɔɪdər/",
                "speculation": "/ˌspekjuˈleɪʃən/",
                "thought-provoking": "/θɔːt prəˈvoʊkɪŋ/",
                "invaluable": "/ɪnˈvæljuəbəl/",
                "unconvincing": "/ˌʌnkənˈvɪnsɪŋ/"
            };
            const lowerWord = word.toLowerCase();
            for (let key in pronunciations) {
                if (lowerWord.includes(key) || key === lowerWord) {
                    return pronunciations[key];
                }
            }
            return `[${word}]`;
        }

        // Create a single card element
        function createCard(english, arabic, moduleNum) {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.dataset.module = moduleNum;

            const pronunciation = generatePronunciation(english);

            cardDiv.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">
                        <div class="word">${escapeHtml(english)}</div>
                        <div class="pronunciation">${pronunciation}</div>
                    </div>
                    <div class="card-back">
                        <div class="meaning">${escapeHtml(arabic)}</div>
                    </div>
                </div>
            `;

            cardDiv.addEventListener('click', function() {
                this.classList.toggle('flipped');
                
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(english);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    speechSynthesis.speak(utterance);
                }
            });

            return cardDiv;
        }

        // Helper to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Render cards based on selected module
        function renderCards(moduleFilter) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';

            const filteredVocab = moduleFilter === 'all' ? vocabData : vocabData.filter(item => item.module == moduleFilter);
            
            filteredVocab.forEach(item => {
                const card = createCard(item.english, item.arabic, item.module);
                container.appendChild(card);
            });
            
            const counter = document.getElementById('cardCounter');
            counter.textContent = `📊 Total cards: ${filteredVocab.length} vocabulary items`;
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            renderCards('all');

            document.getElementById('moduleSelect').addEventListener('change', function() {
                renderCards(this.value);
            });
        });
    </script>
